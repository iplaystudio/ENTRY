<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPLAY 纳新题</title>
    
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css" id="highlight-light">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css" id="highlight-dark" disabled>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js" defer></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js" defer></script>
    
    <script>
        window.MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true,
                processEnvironments: true,
                packages: {'[+]': ['ams', 'newcommand', 'configmacros']}
            },
            options: {
                skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre', 'code']
            },
            startup: {
                pageReady: () => {
                    return MathJax.startup.defaultPageReady().then(() => {
                        console.log('MathJax 已就绪');
                    });
                }
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js" defer></script>
    
    <!-- Firebase SDK - 必须在 comments.js 之前加载 -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <!-- 不再使用 Storage，改用 Base64 存储图片（完全免费）-->
</head>
<body>
    <div class="sidebar-overlay" id="sidebarOverlay" aria-hidden="true"></div>
    
    <div class="container">
        <aside class="sidebar" id="sidebar" role="navigation" aria-label="题目列表">
            <div class="sidebar-header">
                <div class="logo">
                    <h1>🎮 IPLAY</h1>
                    <p class="subtitle">纳新题</p>
                </div>
                <button class="sidebar-toggle" id="sidebarToggle" aria-label="关闭侧边栏">
                    ✕
                </button>
            </div>
            <nav class="problem-list">
                <h2>题目列表</h2>
                <ul id="problemList" role="list"></ul>
            </nav>
            <footer class="sidebar-footer">
                <p>2025 IPLAY</p>
                <p>感谢ACM工作室</p>
                <p>提供题目数据支持</p>
                <p>提供部分的题目</p>
            </footer>
        </aside>

        <main class="main-content" role="main">
            <header class="header">
                <div class="header-content">
                    <button class="btn btn-icon mobile-menu-btn" id="mobileMenuBtn" aria-label="显示菜单">
                        <span class="theme-icon">☰</span>
                    </button>
                    <h1 id="pageTitle">IPLAY 纳新题</h1>
                    <div class="header-actions">
                        <button id="toggleTheme" class="btn btn-icon" aria-label="切换主题">
                            <span class="theme-icon" aria-hidden="true">🌙</span>
                        </button>
                    </div>
                </div>
            </header>

            <div class="content-wrapper">
                <section id="welcomePage" class="welcome-page">
                    <div class="welcome-card">
                        <h2>IPLAY纳新题</h2>
                        <div class="stats">
                            <div class="stat-item">
                                <div class="stat-number" id="totalProblems">11</div>
                                <div class="stat-label">题目总数</div>
                            </div>
                        </div>
                        <p class="instruction">👈 从左侧选择一道题目查看</p>
                    </div>
                </section>

                <article id="problemContent" class="problem-content" style="display: none;">
                    <div class="tabs" role="tablist">
                        <button class="tab-btn active" data-tab="problemTab" role="tab" aria-selected="true" aria-controls="problemTab">
                            <span class="tab-icon" aria-hidden="true">📝</span> 题目
                        </button>
                        <button 
                            id="solutionTabBtn" 
                            class="tab-btn" 
                            data-tab="solutionTab" 
                            role="tab" 
                            aria-selected="false"
                            aria-controls="solutionTab"
                        >
                            <span class="tab-icon">💡</span>
                            参考答案
                        </button>
                        <button 
                            id="commentTabBtn" 
                            class="tab-btn" 
                            data-tab="commentTab" 
                            role="tab" 
                            aria-selected="false"
                            aria-controls="commentTab"
                        >
                            <span class="tab-icon">💬</span>
                            评论 <span id="commentCount" class="comment-badge">0</span>
                        </button>
                    </div>

                    <div class="tab-content">
                        <div id="problemTab" class="tab-pane active" role="tabpanel" aria-labelledby="problem-tab">
                            <div class="content-box">
                                <div id="problemMarkdown"></div>
                            </div>
                        </div>
                        <div id="solutionTab" class="tab-pane" role="tabpanel" aria-labelledby="solution-tab">
                            <div class="content-box">
                                <div id="solutionCode"></div>
                            </div>
                        </div>
                        <div id="commentTab" class="tab-pane" role="tabpanel" aria-labelledby="comment-tab">
                            <div class="content-box">
                                <div id="commentSection" class="comment-section">
                                    <div class="user-profile-bar">
                                        <div class="user-profile-info">
                                            <span class="user-avatar-display" id="userAvatarDisplay">😀</span>
                                            <span class="user-name-display" id="userNameDisplay">匿名用户</span>
                                        </div>
                                        <button id="editProfileBtn" class="btn-edit-profile">✏️ 修改</button>
                                    </div>
                                    <div class="comment-form">
                                        <textarea 
                                            id="commentInput" 
                                            placeholder="b站虽然会变味，但永远不会倒闭(雾)..." 
                                            maxlength="500"
                                            rows="4"
                                        ></textarea>
                                        <div class="comment-form-footer">
                                            <span class="char-count"><span id="charCount">0</span>/500</span>
                                            <button id="submitComment" class="btn-submit">发送</button>
                                        </div>
                                    </div>
                                    <div id="commentsList" class="comments-list">
                                        <div class="loading">加载评论中...</div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </article>
            </div>
        </main>
    </div>

    <!-- 用户资料编辑弹窗 -->
    <div id="profileModal" class="modal-overlay" style="display: none;">
        <div class="modal-content profile-modal">
            <div class="modal-header">
                <h3>修改我的资料</h3>
                <button class="modal-close" id="closeProfileModal">✕</button>
            </div>
            <div class="modal-body">
                <div class="profile-edit-section">
                    <label>选择头像类型</label>
                    <div class="avatar-type-tabs">
                        <button class="avatar-type-tab active" data-type="emoji">😊 表情</button>
                        <button class="avatar-type-tab" data-type="image">🏞️ 图片</button>
                    </div>
                </div>
                <div class="profile-edit-section" id="emojiAvatarSection">
                    <label>选择表情头像</label>
                    <div class="avatar-grid" id="avatarGrid">
                        <!-- 头像选项会动态生成 -->
                    </div>
                </div>
                <div class="profile-edit-section" id="imageAvatarSection" style="display: none;">
                    <label>上传头像图片</label>
                    <div class="file-upload-area" id="fileUploadArea">
                        <input 
                            type="file" 
                            id="avatarFileInput" 
                            accept="image/*"
                            style="display: none;"
                        />
                        <div class="upload-prompt">
                            <div class="upload-icon">📁</div>
                            <div class="upload-text">点击选择图片</div>
                            <div class="upload-hint">支持 JPG、PNG、GIF，最大 5MB</div>
                        </div>
                    </div>
                    <div class="avatar-preview" id="avatarPreview" style="display: none;">
                        <div class="avatar-preview-placeholder">预览区域</div>
                    </div>
                    <div class="upload-progress" id="uploadProgress" style="display: none;">
                        <div class="progress-bar">
                            <div class="progress-fill" id="progressFill"></div>
                        </div>
                        <div class="progress-text" id="progressText">上传中...</div>
                    </div>
                </div>
                <div class="profile-edit-section">
                    <label>昵称</label>
                    <input 
                        type="text" 
                        id="nicknameInput" 
                        placeholder="输入你的昵称" 
                        maxlength="20"
                        class="profile-input"
                    />
                    <div class="input-hint">最多20个字符</div>
                </div>
            </div>
            <div class="modal-footer">
                <button id="saveProfileBtn" class="btn-primary">保存</button>
                <button id="cancelProfileBtn" class="btn-secondary">取消</button>
            </div>
        </div>
    </div>

    <script src="comments.js"></script>
    <script src="script.js"></script>
</body>
</html>
